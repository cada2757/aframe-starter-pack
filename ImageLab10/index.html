<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>

      <a-assets>
        <img id="icecream" src="Assets/icecream.png">
        <img id="beachball" src="Assets/beachball.jpeg">
      </a-assets>


      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere src="#beachball" position="0 1.25 -5" radius="1.25"></a-sphere>
      <a-plane src="beachball" position="0 0 -4" rotation="-90 0 0" width="100" height="100"></a-plane>
      <a-sky src="#icecream"></a-sky>
    </a-scene>
  </body>
</html>
