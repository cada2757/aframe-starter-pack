<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
    <a-assets>
      <img id="sky" src="assets/sky.png">
      <img id="ball" src="assets/beachball.jpg">
      <img id="cone" src="assets/cone.jpeg">
      <img id="icecream" src="assets/icecream.jpg">
    </a-assets>
      <a-sphere position="-3 1.25 -5" radius="1.25" src="#ball"></a-sphere>
      <a-sphere position="1 2.25 -3" radius="1.25" src="#icecream"></a-sphere>
      <a-cone position="1 0.75 -3" radius="0.5" height="1.5" src="#cone" rotation="-180 0 0"></a-cone>
      <a-sky src="#sky" radius="30"></a-sky>
    </a-scene>   
  </body>
</html>
